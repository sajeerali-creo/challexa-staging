<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challexa</title>
    <!-- favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon-180.png">
    <!-- main style -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- icon font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

</head>

<body>






    <section class="auth-section">
        <div class="auth-container">
            <div class="d-flex justify-content-center text-center flex-column align-items-center">
                <a href="/">
                    <img src="img/logo.svg" alt>
                </a>
                <p class="subtitle pt-16">Sign in to continue</p>
            </div>





            <!-- FORM -->
            <form class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <div class="form-extra">
                    <label class="custom-checkbox">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button class="auth-btn">Sign In →</button>
            </form>

            <div class="divider"><span>or</span></div>



            <!-- SOCIAL LOGIN -->
            <div class="social-login">
                <button class="social-btn google">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
                    Continue with Google
                </button>

                <button class="social-btn linkedin">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg">
                    Continue with LinkedIn
                </button>
            </div>

            <p class="bottom-text">
                Don’t have an account? <a href="sign-up.html">Register</a>
            </p>

        </div>
    </section>

    <!-- script -->
    <script type="text/javascript" src="js/main.js"></script>

</body>

</html>
