<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challexa</title>
    <!-- favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="img/favicon-96x96.png"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon-180.png" />
    <!-- main style -->
    <link rel="stylesheet" href="css/styles.css" />
    <!-- icon font -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
  </head>

  <body>
    <section class="auth-section pt-96 pb-96">
      <div class="auth-container">
        <div
          class="d-flex justify-content-center text-center flex-column align-items-center"
        >
          <a href="index.html">
            <img src="img/logo.svg" alt />
          </a>
          <p class="subtitle pt-16 pb-16">Sign up to get started</p>
        </div>

        <!-- FORM -->
        <form class="auth-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create password" />
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" />
          </div>

          <!-- CHECKBOX -->
          <label class="custom-checkbox mb-16">
            <input type="checkbox" />
            <span class="checkmark"></span>
            I agree to Terms & Conditions
          </label>

          <a
            href="sign-in.html"
            class="auth-btn mt-16 d-flex align-items-center justify-content-center"
            >Sign Up →</a
          >
        </form>

        <!-- DIVIDER -->
        <div class="divider"><span>or</span></div>

        <!-- SOCIAL LOGIN -->
        <div class="social-login">
          <button class="social-btn">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
            />
            Continue with Google
          </button>

          <button class="social-btn">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg"
            />
            Continue with LinkedIn
          </button>
        </div>

        <p class="bottom-text">
          Already have an account? <a href="sign-in.html">Sign In</a>
        </p>
      </div>
    </section>

    <!-- script -->
    <script type="text/javascript" src="js/main.js"></script>
  </body>
</html>
