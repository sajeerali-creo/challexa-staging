<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challexa</title>
    <!-- favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="img/favicon-96x96.png"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon-180.png" />
    <!-- main style -->
    <link rel="stylesheet" href="css/styles.css" />
    <!-- icon font -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
  </head>

  <body>
    <!-- header -->
    <div
      class="d-flex justify-content-between align-items-center p-8 px-16 inner-head"
    >
      <a href="/">
        <img src="img/logo-icon.svg" class="h-30" alt />
      </a>
      <button class="open-btn d-lg-none" onclick="openMenu()">
        <i class="ti ti-menu-2"></i>
      </button>
    </div>

    <!-- Overlay -->
    <div id="overlay" onclick="closeMenu()"></div>
    <!-- Offcanvas Sidebar -->
    <div id="offcanvas">
      <div class="d-flex justify-content-between pb-16">
        <a href="#">
          <img src="img/logo-icon.svg" class="h-30" alt />
        </a>
        <button class="close-btn" onclick="closeMenu()">
          <i class="ti ti-x text-white"></i>
        </button>
      </div>

      <div class="Sidebar">
        <div
          class="black-box d-flex justify-content-center flex-column align-items-center mb-16"
        >
          <div class="logo-tournment">
            <img src="img/tournment-img.png" alt="" />
          </div>
          <div class="mt-16">
            <h1 class="h2 text-gradient">NBD Tour</h1>
          </div>
          <div class="mt-8 d-flex gap-16">
            <div class="d-flex align-items-center gap-4">
              <i class="ti ti-stopwatch text-brand fs-12"></i>
              <span class="text-white opacity-50 fs-12">08:00PM</span>
            </div>
            <div class="d-flex align-items-center gap-4">
              <i class="ti ti-calendar-due text-brand fs-12"></i>
              <span class="text-white opacity-50 fs-12">20/03/2025</span>
            </div>
          </div>
        </div>
        <a href="tournment-detail.html" class="menu-list active">
          <i class="ti ti-eye"></i>overview
        </a>
        <div>
          <img src="img/line.svg" alt="" />
        </div>
        <a href="tournment-player.html" class="menu-list">
          <i class="ti ti-user"></i>Players
        </a>

        <div>
          <img src="img/line.svg" alt="" />
        </div>
        <a href="tournment-check-in.html" class="menu-list">
          <i class="ti ti-users"></i>check-in
        </a>
        <div>
          <img src="img/line.svg" alt="" />
        </div>
        <a href="tournment-matches-a.html" class="menu-list">
          <i class="ti ti-layout-grid"></i>Matches
        </a>
        <div>
          <img src="img/line.svg" alt="" />
        </div>
        <a href="tournment-draw.html" class="menu-list">
          <i class="ti ti-git-branch"></i>Draw
        </a>
      </div>
    </div>

    <section class="d-flex">
      <div class="Sidebar d-none d-lg-block">
        <div
          class="black-box d-flex justify-content-center flex-column align-items-center mb-48"
        >
          <div class="logo-tournment">
            <img src="img/tournment-img.png" alt="" />

          <div class="mt-16">
            <h1 class="h2 text-gradient">NBD Tour</h1>
          </div>
          <div class="mt-8 d-flex gap-4">
            <div class="d-flex align-items-center gap-4">
              <i class="ti ti-stopwatch text-brand"></i>
              <span class="text-white opacity-50 fs-12">08:00PM</span>
            </div>
            <div class="d-flex align-items-center gap-4">
              <i class="ti ti-calendar-due text-brand"></i>
              <span class="text-white opacity-50 fs-12">20/03/2025</span>

          </div>

        <a href="tournment-detail.html" class="menu-list active">
          <i class="ti ti-eye"></i>overview
        </a>
        <div>
          <img src="img/line.svg" alt="" />

          <i class="ti ti-user"></i>Players
        </a>
        <div>
          <img src="img/line.svg" alt="" />

          <i class="ti ti-users"></i>check-in

        <div>

          <i class="ti ti-git-branch"></i>Draw
        </a>
      </div>

        <div class="menu-top">
          <a href="tournment-detail.html">OVERVIEW</a>
          <a href="format.html">FORMAT</a>
          <a href="rules.html">RULES</a>
          <a href="prize.html" class="active">PRIZE</a>

          <div class="d-flex gap-16">
            <h3 class="h2 text-gradient mb-48">PRIZE</h3>
            <h3 class="h2 text-white mb-48">category:</h3>
            <h3 class="h2 text-gradient mb-48">Open-D</h3>
          </div>
          <div class="row">
            <div class="col-lg-4">
              <div
                class="prize-box secnd w-100 text-center d-flex flex-column justify-content-between"
              >
                <h3>2ND</h3>
                <img src="img/2nd.png" alt="" />
                <div class="prize fs-24">1500</div>
              </div>
            </div>
            <div class="col-lg-4">
              <div
                class="prize-box firstst w-100 text-center d-flex flex-column justify-content-between"
              >
                <h3>1st</h3>
                <img src="img/first.png" alt="" />
                <div class="prize fs-32">2500</div>
              </div>
            </div>
            <div class="col-lg-4">
              <div
                class="prize-box last w-100 text-center d-flex flex-column justify-content-between"
              >
                <h3>3rd</h3>
                <img src="img/last.png" alt="" />
                <div class="prize fs-32">500</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    <!-- script -->
    <script type="text/javascript" src="js/main.js"></script>
