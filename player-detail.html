<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challexa</title>
    <!-- favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon-180.png">
    <!-- main style -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- icon font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

</head>

<body>


    <section>
        <div class="container">
            <div class="w-100 text-center pt-24 d-flex justify-content-between align-items-center">
                <a href="tournment-player.html" class="btn-back"><i class="ti ti-arrow-left"></i></a>
                <h1 class="page-heading text-white text-uppercase">Player Profile</h1>
                <div>&nbsp;</div>
            </div>

            <div class="row mt-48">
                <div class="container">
                    <div class="row justify-content-center align-items-center">
                        <div class="col-lg-6 loader-box lazy-section">
                            <img src="img/profile-details.avif" class="img-fluid" alt="">
                        </div>
                        <div class="col-lg-6">
                            <h2 class="text-gradient text-uppercase">PRIYANKA Javeri</h2>
                            <span class="text-white opacity-50 fs-12 text-uppercase d-flex mb-16 mt-8">PLAYER Details</span>
                            <div class="d-flex justify-content-between p-16 list-card mb-8 loader-box lazy-section">
                                <span class="text-white opacity-50 font-weight-400">Nationality</span>
                                <div class="d-flex gap-4">
                                    <span class="fi fi-ae fs-12"></span>
                                    <span class="text-white">UAE</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between p-16 list-card mb-8 loader-box lazy-section">
                                <span class="text-white opacity-50 font-weight-400">Plays</span>
                                <div class="d-flex gap-4">
                                    <span class="text-white">Righ-Hand</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between p-16 list-card mb-8 loader-box lazy-section">
                                <span class="text-white opacity-50 font-weight-400">Nationality</span>
                                <div class="d-flex gap-4">
                                    <span class="fi fi-ae fs-12"></span>
                                    <span class="text-white">UAE</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between p-16 list-card mb-8 loader-box lazy-section">
                                <span class="text-white opacity-50 font-weight-400">Height</span>
                                <div class="d-flex gap-4">
                                    <span class="text-white">54 CM</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between p-16 list-card mb-8 loader-box lazy-section">
                                <span class="text-white opacity-50 font-weight-400">Weight</span>
                                <div class="d-flex gap-4">
                                    <span class="text-white">69KG</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between p-16 list-card mb-8 loader-box lazy-section">
                                <span class="text-white opacity-50 font-weight-400">Preferred Side</span>
                                <div class="d-flex gap-4">
                                    <span class="text-white">Right</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between p-16 list-card mb-8 loader-box lazy-section">
                                <span class="text-white opacity-50 font-weight-400">Gender</span>
                                <div class="d-flex gap-4">
                                    <span class="text-white">Male</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </section>

    <!-- script -->
    <script type="text/javascript" src="js/main.js"></script>

</body>

</html>
